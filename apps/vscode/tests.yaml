schemaVersion: 2.0.0

commandTests:
  - name: code-server is available
    command: code-server
    args: ["--version"]
    expectedOutput: [".+"]

  - name: mise is available
    command: mise
    args: ["--version"]
    expectedOutput: [".+"]

  - name: codex is available
    command: codex
    args: ["--version"]
    expectedOutput: [".+"]

  - name: python3 is available
    command: python3
    args: ["--version"]
    expectedOutput: ["Python 3"]

fileExistenceTests:
  - name: defaults directory exists
    path: /opt/code-server-defaults
    shouldExist: true

  - name: home directory exists
    path: /home/coder
    shouldExist: true

metadataTest:
  exposedPorts: ["8080"]
  user: "1000:1000"
  workdir: "/workspace"
